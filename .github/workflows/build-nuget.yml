name: Build NuGet Package

on:
  push:
    paths:
      - 'ScottReed.Optimizely.Forms.DynamicEmailRouting/**'
      - '.github/workflows/build-nuget.yml'
  pull_request:
    paths:
      - 'ScottReed.Optimizely.Forms.DynamicEmailRouting/**'

env:
  PROJECT_PATH: ScottReed.Optimizely.Forms.DynamicEmailRouting/ScottReed.Optimizely.Forms.DynamicEmailRouting.csproj
  NUGET_OUTPUT: ./nupkgs
  MAJOR_VERSION: 1

# Required for updating repository variables via gh CLI
permissions:
  actions: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add Optimizely NuGet feed
        run: dotnet nuget add source https://nuget.optimizely.com/feed/packages.svc/ --name Optimizely

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release — use exact tag version
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.ref }}" == refs/heads/main || "${{ github.ref }}" == refs/heads/master ]]; then
            # Main/master branch — use MAJOR.MINOR.0 from repo variables
            MINOR=${{ vars.MINOR_VERSION || '0' }}
            VERSION=${{ env.MAJOR_VERSION }}.${MINOR}.0
          else
            # PR or other branch — preview version
            MINOR=${{ vars.MINOR_VERSION || '0' }}
            VERSION=${{ env.MAJOR_VERSION }}.${MINOR}.0-preview
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }} /p:CI=true
        env:
          CI: true

      - name: Pack
        run: dotnet pack ${{ env.PROJECT_PATH }} -c Release -o ${{ env.NUGET_OUTPUT }} /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ env.NUGET_OUTPUT }}/*.nupkg
            ${{ env.NUGET_OUTPUT }}/*.snupkg

      # Auto-increment MINOR_VERSION after successful build on main/master
      - name: Increment minor version
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CURRENT=${{ vars.MINOR_VERSION || '0' }}
          NEXT=$((CURRENT + 1))
          gh variable set MINOR_VERSION --body "$NEXT"
          echo "Incremented MINOR_VERSION: $CURRENT → $NEXT"
